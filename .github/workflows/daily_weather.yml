name: Daily Weather Report

on:
  schedule:
    - cron: "30 2 * * *"   # ~8:00 AM IST (GitHub may delay slightly)
  workflow_dispatch:
    inputs:
      manual_run:
        description: "Set to 1 to bypass hour check"
        default: "1"

jobs:
  send-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests

      - name: Run weather bot
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          MANUAL_RUN: ${{ github.event.inputs.manual_run || '0' }}
        run: python3 weather_bot.py

      - name: Commit email log
        run: |
          git config user.name "Weather Bot"
          git config user.email "bot@weather"
          git pull --rebase
          git add logs/email_log.csv
          git diff --cached --quiet || git commit -m "📧 Log: $(date +'%Y-%m-%d %H:%M') run"
          git push
