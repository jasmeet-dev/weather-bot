name: Daily Weather Report

on:
  schedule:
    - cron: "30 2 * * *"  # 8:00 AM IST (UTC+5:30)
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests

      - name: Run weather bot
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python3 weather_bot.py

      - name: Commit email log
        run: |
          git config user.name "Weather Bot"
          git config user.email "bot@weather"
          git add logs/email_log.csv
          git diff --cached --quiet || git commit -m "📧 Log: $(date +'%Y-%m-%d') email run"
          git push
